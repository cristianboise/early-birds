<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Early Birds — March Madness 2026</title>
    <style>
        :root {
            --bg: #0f1318;
            --card-bg: #1a1f2e;
            --card-border: #2a3040;
            --text: #e8eaf0;
            --text-muted: #8890a0;
            --gold: #ffd700;
            --green: #4caf50;
            --red: #f44336;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 40px;
        }

        .header {
            background: linear-gradient(180deg, #141822 0%, var(--bg) 100%);
            border-bottom: 1px solid var(--card-border);
            padding: 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-logo {
            display: block;
            width: 140px;
            height: 140px;
            margin: 0 auto 10px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--gold);
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.2);
        }

        .header .subtitle {
            font-size: 1.3rem;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .live-indicator {
            display: none;
            align-items: center;
            gap: 6px;
            justify-content: center;
            margin-bottom: 6px;
            font-size: 0.8rem;
            font-weight: 700;
            color: #4ade80;
        }

        .live-indicator.visible { display: flex; }

        .live-dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        #last-updated {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        #tournament-progress {
            display: flex;
            gap: 6px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        .round-pill {
            background: #2a3040;
            border: 1px solid #3a4050;
            color: var(--text-muted);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .round-pill.completed {
            background: var(--green);
            color: #fff;
            border-color: var(--green);
        }

        .round-pill.active {
            background: #e85d4a;
            color: #fff;
            border-color: #e85d4a;
        }

        .round-pill.upcoming {
            background: #2a3040;
            color: var(--text-muted);
            border-color: #3a4050;
        }

        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 15px;
        }

        .tab-nav {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text-muted);
            font-size: 0.95rem;
            font-weight: 600;
            padding: 10px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 8px;
        }

        .tab-btn:hover {
            color: var(--text);
            border-color: var(--gold);
        }

        .tab-btn.active {
            background: var(--gold);
            color: #000;
            border-color: var(--gold);
        }

        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Leader Card */
        .leader-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
        }

        .leader-title {
            font-size: 0.85rem;
            color: var(--gold);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
        }

        .leader-name {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .leader-crown { font-size: 2.5rem; }

        .leader-stats {
            font-size: 1rem;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 18px;
        }

        .ranking-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
        }

        .ranking-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            border-left: 3px solid var(--gold);
        }

        .ranking-rank {
            font-weight: 800;
            color: var(--gold);
            min-width: 30px;
            font-size: 1.1rem;
        }

        .ranking-name {
            flex: 1;
            font-weight: 600;
            color: var(--text);
        }

        .ranking-pts {
            color: var(--text-muted);
            font-weight: 700;
            font-size: 1rem;
        }

        /* Standings Table */
        .standings-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 20px;
            overflow-x: auto;
        }

        table { width: 100%; border-collapse: collapse; font-size: 0.95rem; }
        thead { border-bottom: 2px solid var(--card-border); }

        th {
            padding: 12px 10px;
            text-align: left;
            font-weight: 700;
            color: var(--gold);
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
        }

        td {
            padding: 12px 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        tr:hover { background-color: rgba(255, 255, 255, 0.03); }

        .player-name { font-weight: 600; color: var(--text); min-width: 120px; }

        .pts-col, .max-col {
            font-weight: 700;
            color: var(--text);
            text-align: center;
            min-width: 50px;
        }

        .round-col {
            text-align: center;
            color: var(--text-muted);
            font-weight: 500;
            min-width: 40px;
        }

        .round-col.correct { color: #4ade80; font-weight: 700; }
        .round-col.incorrect { color: var(--red); opacity: 0.6; }
        .round-col.pending { color: var(--gold); }

        /* Game Results */
        .results-container {}

        .region-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            margin-bottom: 16px;
            overflow: hidden;
        }

        .region-header {
            padding: 14px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-left: 4px solid;
        }

        .region-header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .region-name {
            font-size: 1.1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .games-count {
            font-size: 0.75rem;
            color: var(--text-muted);
            background: rgba(255,255,255,0.06);
            padding: 2px 8px;
            border-radius: 10px;
        }

        .seed-badge {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 4px;
            background: rgba(244, 67, 54, 0.2);
            color: var(--red);
            font-weight: 600;
        }

        .round-subheader {
            padding: 6px 18px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.02);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .game-row {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            padding: 8px 18px;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            gap: 12px;
        }

        .game-row:hover { background: rgba(255, 255, 255, 0.02); }

        .gt-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .gt-right {
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: flex-end;
        }

        .gt-seed {
            font-size: 0.7rem;
            color: var(--text-muted);
            min-width: 16px;
            text-align: center;
        }

        .gt-name { font-size: 0.9rem; }

        .gw { font-weight: 700; color: #4ade80; }
        .gl { color: var(--text-muted); }

        .gt-score {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            min-width: 50px;
        }

        .score-val {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text);
        }

        .score-dash {
            font-size: 0.6rem;
            color: var(--text-muted);
        }

        .game-badges {
            display: flex;
            gap: 4px;
            align-items: center;
            padding: 2px 18px 6px;
        }

        .upset-badge {
            font-size: 0.6rem;
            padding: 1px 6px;
            border-radius: 4px;
            background: rgba(244, 67, 54, 0.3);
            color: var(--red);
            font-weight: 600;
        }

        .live-badge {
            font-size: 0.6rem;
            padding: 1px 6px;
            border-radius: 4px;
            background: rgba(74, 222, 128, 0.2);
            color: #4ade80;
            font-weight: 600;
            animation: pulse 1.5s infinite;
        }

        .date-badge {
            font-size: 0.6rem;
            padding: 1px 6px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-muted);
        }

        /* Scoring Footer */
        .info-footer {
            max-width: 1200px;
            margin: 30px auto;
            padding: 18px 15px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .scoring-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 8px;
            margin-top: 10px;
        }

        .score-item {
            background: rgba(255, 255, 255, 0.04);
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            border: 1px solid var(--card-border);
        }

        .score-round { color: var(--text-muted); font-weight: 700; font-size: 0.8rem; }
        .score-pts { color: var(--gold); font-weight: 800; font-size: 1.2rem; }

        @media (max-width: 768px) {
            .header-logo { width: 110px; height: 110px; }
            .leader-name { font-size: 1.6rem; }
            .leader-card { padding: 15px; }
            table { font-size: 0.8rem; }
            th, td { padding: 10px 6px; }
            .tab-btn { padding: 8px 14px; font-size: 0.9rem; }
            .game-row { padding: 8px 12px; gap: 8px; }
            .region-header { padding: 12px; }
            .round-subheader { padding: 6px 12px; }
        }

        @media (max-width: 480px) {
            .header .subtitle { font-size: 0.9rem; }
            .leader-name { font-size: 1.3rem; gap: 8px; }
            .leader-crown { font-size: 1.8rem; }
            .standings-card { padding: 10px; }
            table { font-size: 0.7rem; }
            th, td { padding: 8px 4px; }
            .round-col { min-width: 30px; }
        }
    </style>
</head>

        const ESPN_TO_APP = {'MSU':'MICHST','NDSU':'NDAKST','KENN':'KENSAW','HAW':'HAWAII','HPU':'HIGHPT','MCN':'MCNSE','LOU':'LVILLE','USF':'SFLA','SCU':'SNCLRA','TA&M':'TEXAM','OSU':'OHIOST','SLU':'STLOU','PV':'PVAM','ISU':'IOWAST','PUR':'PURDUE','QUC':'QUEENC','CONN':'UCONN','WRST':'WRIGHT','ALA':'BAMA','HOF':'HOFSTRA','KU':'KANSAS','CBU':'CALBPTST','WIS':'WISC','VAN':'VANDY','GONZ':'GONZAG','SMC':'MARYCA','VILL':'NOVA','TTU':'TXTECH','MIA':'MIAMI','MIZ':'MIZZOU','M-OH':'MIAOH','SJU':'STJOHN','AKR':'AKRON','UNI':'NIOWA','USU':'UTAHST','TEX':'TEXAS','IDHO':'IDAHO','SIE':'SIENA','FUR':'FURMAN'};

        const TOURN_DATES = ['20260319','20260320','20260321','20260322','20260326','20260327','20260328','20260329','20260404','20260406'];

        const TEAM_NAMES = {"DUKE":"Duke","SIENA":"Siena","OHIOST":"Ohio St.","TCU":"TCU","STJOHN":"St. John's","NIOWA":"N. Iowa","KANSAS":"Kansas","CALBPTST":"Cal Baptist","LVILLE":"Louisville","SFLA":"South Florida","MICHST":"Michigan St.","NDAKST":"N. Dakota St.","UCLA":"UCLA","UCF":"UCF","UCONN":"UConn","FURMAN":"Furman","FLA":"Florida","PVAM":"Prairie View","CLEM":"Clemson","IOWA":"Iowa","VANDY":"Vanderbilt","MCNSE":"McNeese","NEB":"Nebraska","TROY":"Troy","UNC":"N. Carolina","VCU":"VCU","ILL":"Illinois","PENN":"Penn","MARYCA":"Saint Mary's","TEXAM":"Texas A&M","HOU":"Houston","IDAHO":"Idaho","ARIZ":"Arizona","LIU":"LIU","NOVA":"Villanova","UTAHST":"Utah St.","WISC":"Wisconsin","HIGHPT":"High Point","ARK":"Arkansas","HAWAII":"Hawaii","BYU":"BYU","TEXAS":"Texas","GONZAG":"Gonzaga","KENSAW":"Kennesaw St.","MIAMI":"Miami","MIZZOU":"Missouri","PURDUE":"Purdue","QUEENC":"Queens","MICH":"Michigan","HOW":"Howard","UGA":"Georgia","STLOU":"Saint Louis","TXTECH":"Texas Tech","AKRON":"Akron","BAMA":"Alabama","HOFSTRA":"Hofstra","TENN":"Tennessee","MIAOH":"Miami (Ohio)","UVA":"Virginia","WRIGHT":"Wright St.","UK":"Kentucky","SNCLRA":"Santa Clara","IOWAST":"Iowa St.","TNST":"Tenn. State"};

        const SCORING = {2:1,3:2,4:4,5:8,6:16,7:32};
        const ROUND_NAMES = {2:"Round 1",3:"Round 2",4:"Sweet 16",5:"Elite Eight",6:"Final Four",7:"Championship"};
        const REGION_FULL = {"E":"EAST","S":"SOUTH","W":"WEST","M":"MIDWEST","F":"FINAL FOUR"};
        const REGION_COLORS = {"E":"#4a90d9","S":"#50c878","W":"#e74c3c","M":"#f39c12","F":"#ffd700"};

        // ============== STATE ==============
        let liveGames = {};

        // ============== ESPN FUNCTIONS ==============
        function advanceWinner(idx) {
            const m = MATCHUPS[idx];
            const winner = m[6];
            if (!winner || winner === '') return;

            const nextIdx = m[7];
            if (nextIdx < 0 || nextIdx >= MATCHUPS.length) return;

            const next = MATCHUPS[nextIdx];
            const winnerSeed = (m[2] === winner) ? m[3] : m[5];

            if (idx % 2 === 0) {
                next[2] = winner;
                next[3] = winnerSeed;
            } else {
                next[4] = winner;
                next[5] = winnerSeed;
            }
        }

        async function fetchLiveScores() {
            try {
                // Iterate ALL past tournament dates
                const today = new Date();
                const todayStr = today.getFullYear() + String(today.getMonth()+1).padStart(2,'0') + String(today.getDate()).padStart(2,'0');
                const datesToCheck = TOURN_DATES.filter(d => d <= todayStr);

                for (const dateStr of datesToCheck) {
                    const url = `https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard?dates=${dateStr}&groups=100`;
                    const resp = await fetch(url);
                    const data = await resp.json();
                    if (!data.events) continue;

                    for (const evt of data.events) {
                        const statusName = evt.status.type.name;
                        const comp = evt.competitions[0];
                        const away = comp.competitors.find(c => c.homeAway === 'away');
                        const home = comp.competitors.find(c => c.homeAway === 'home');
                        if (!away || !home) continue;

                        const awayCode = espnToApp(away.team.abbreviation);
                        const homeCode = espnToApp(home.team.abbreviation);
                        if (!awayCode || !homeCode) continue;

                        const idx = findMatchupIdx(awayCode, homeCode);
                        if (idx === null) continue;

                        const topCode = MATCHUPS[idx][2];
                        const topScore = topCode === awayCode ? parseInt(away.score) : parseInt(home.score);
                        const bottomScore = topCode === awayCode ? parseInt(home.score) : parseInt(away.score);
                        const dateLabel = dateStr.substring(4,6) + '/' + dateStr.substring(6);

                        if (statusName === 'STATUS_IN_PROGRESS' || statusName === 'STATUS_END_PERIOD') {
                            liveGames[idx] = evt.status.type.shortDetail || 'Live';
                            GAME_DETAILS[idx] = [topScore, bottomScore, dateLabel];
                        } else if (statusName === 'STATUS_FINAL') {
                            const winnerCode = topScore > bottomScore ? topCode : MATCHUPS[idx][4];

                            if (!MATCHUPS[idx][6] || MATCHUPS[idx][6] === '') {
                                MATCHUPS[idx][6] = winnerCode;
                                advanceWinner(idx);
                            }

                            GAME_DETAILS[idx] = [topScore, bottomScore, dateLabel];
                            liveGames[idx] = false;
                        }
                    }
                }
            } catch (err) {
                console.log('ESPN fetch error:', err);
            }
        }

        function espnToApp(abbr) {
            if (abbr in ESPN_TO_APP) return ESPN_TO_APP[abbr];
            return abbr.length <= 5 ? abbr.toUpperCase() : null;
        }

        function findMatchupIdx(team1, team2) {
            for (let i = 0; i < MATCHUPS.length; i++) {
                const m = MATCHUPS[i];
                if ((m[2] === team1 && m[4] === team2) || (m[2] === team2 && m[4] === team1)) return i;
            }
            return null;
        }

        function updateLiveScores() {
            fetchLiveScores().then(() => {
                render();
                updateLastUpdated();
            });
        }

        // ============== SCORING LOGIC ==============
        function computeScores() {
            const playerScores = {};
            for (const player in PICKS) {
                playerScores[player] = { pts: 0, max: 0, cpk: 0, byRound: {} };
                for (const round of [2,3,4,5,6,7]) {
                    playerScores[player].byRound[round] = 0;
                }
            }

            for (let i = 0; i < MATCHUPS.length; i++) {
                const m = MATCHUPS[i];
                const round = m[0];
                if (!(round in SCORING)) continue;
                const scoreVal = SCORING[round];
                const winner = m[6];
                if (!winner || winner === '') continue;

                for (const player in PICKS) {
                    const pick = PICKS[player][i];
                    if (!pick || pick === '') continue;
                    if (pick === winner) {
                        playerScores[player].pts += scoreVal;
                        playerScores[player].cpk += 1;
                        playerScores[player].byRound[round] = (playerScores[player].byRound[round] || 0) + scoreVal;
                    }
                }
            }

            // Compute MAX
            for (const player in PICKS) {
                let maxPossible = playerScores[player].pts;
                for (let i = 0; i < MATCHUPS.length; i++) {
                    const m = MATCHUPS[i];
                    const round = m[0];
                    if (!(round in SCORING)) continue;
                    const scoreVal = SCORING[round];
                    const winner = m[6];
                    const pick = PICKS[player][i];
                    if (!pick || pick === '') continue;
                    if (winner && winner !== '') continue;
                    if (isTeamAlive(pick)) {
                        maxPossible += scoreVal;
                    }
                }
                playerScores[player].max = maxPossible;
            }

            const sorted = Object.entries(playerScores)
                .map(([name, sc]) => ({ name, ...sc }))
                .sort((a, b) => b.pts - a.pts || b.max - a.max);

            sorted.forEach((s, idx) => { s.rank = idx + 1; });
            return sorted;
        }

        function isTeamAlive(team) {
            for (const m of MATCHUPS) {
                const t1 = m[2]; const t2 = m[4]; const winner = m[6];
                if (winner && winner !== '') {
                    if ((t1 === team || t2 === team) && winner !== team) return false;
                }
            }
            for (const m of MATCHUPS) {
                if (m[2] === team || m[4] === team) return true;
            }
            return false;
        }

        function getCompletedRounds() {
            const rc = {}, rd = {};
            for (let i = 0; i < MATCHUPS.length; i++) {
                const r = MATCHUPS[i][0];
                rc[r] = (rc[r] || 0) + 1;
                if (MATCHUPS[i][6] && MATCHUPS[i][6] !== '') rd[r] = (rd[r] || 0) + 1;
            }
            const s = {};
            for (const r of [2, 3, 4, 5, 6, 7]) {
                const t = rc[r] || 0, d = rd[r] || 0;
                if (d === t && t > 0) s[r] = 'completed';
                else if (d > 0) s[r] = 'active';
                else s[r] = 'upcoming';
            }
            return s;
        }

        function getResultsByRegion() {
            const regions = {};
            for (const region of ['E', 'S', 'W', 'M', 'F']) {
                regions[region] = [];
            }

            for (let i = 0; i < MATCHUPS.length; i++) {
                const m = MATCHUPS[i];
                const round = m[0];
                const region = m[1];
                const topTeam = m[2];
                const topSeed = m[3];
                const bottomTeam = m[4];
                const bottomSeed = m[5];
                const winner = m[6];
                const isLive = liveGames[i] || false;

                // Include game if it has a winner OR if it's live in progress
                const hasWinner = winner && winner !== '';
                if (!hasWinner && !isLive) continue;
                if (!topTeam || !bottomTeam) continue;

                const detail = GAME_DETAILS[i] || [0, 0];
                let topScore = 0, bottomScore = 0;
                if (Array.isArray(detail) && detail.length >= 2) {
                    topScore = detail[0];
                    bottomScore = detail[1];
                }

                const upset = hasWinner && winner === bottomTeam && bottomSeed > topSeed;
                const dateStr = (Array.isArray(detail) && detail.length >= 3 && detail[2]) ? detail[2] : null;

                regions[region].push({
                    idx: i, round, topTeam, topSeed, bottomTeam, bottomSeed,
                    winner: hasWinner ? winner : '', upset, topScore, bottomScore, date: dateStr, live: isLive
                });
            }

            for (const region in regions) {
                regions[region].sort((a, b) => a.round - b.round || a.idx - b.idx);
            }
            return regions;
        }

        // ============== RENDERING ==============
        function renderResults() {
            const rn = {"E":"EAST Region","S":"SOUTH Region","W":"WEST Region","M":"MIDWEST Region","F":"FINAL FOUR"};
            const rc = {"E":"#4a90d9","S":"#50c878","W":"#e74c3c","M":"#f39c12","F":"#ffd700"};
            const resultsByRegion = getResultsByRegion();
            let html = '';

            for (const reg of ['E','S','W','M','F']) {
                const games = resultsByRegion[reg];
                if (games.length === 0) continue;

                const color = rc[reg];
                const upsetCount = games.filter(g => g.upset).length;

                html += '<div class="region-card">';
                html += '<div class="region-header" style="border-left-color:' + color + '">';
                html += '<div class="region-header-left">';
                html += '<span class="region-name" style="color:' + color + '">' + rn[reg] + '</span>';
                if (upsetCount > 0) {
                    html += '<span class="seed-badge">' + upsetCount + ' upset' + (upsetCount > 1 ? 's' : '') + '</span>';
                }
                html += '</div>';
                html += '</div>';

                let lastRound = 0;
                for (const g of games) {
                    if (g.round !== lastRound) {
                        html += '<div class="round-subheader">' + (ROUND_NAMES[g.round] || 'Round ' + g.round) + '</div>';
                        lastRound = g.round;
                    }

                    const topName = TEAM_NAMES[g.topTeam] || g.topTeam;
                    const botName = TEAM_NAMES[g.bottomTeam] || g.bottomTeam;
                    const hasWinner = g.winner && g.winner !== '';
                    const topWin = hasWinner && g.winner === g.topTeam;
                    const botWin = hasWinner && g.winner === g.bottomTeam;

                    // For live games with no winner, both teams show in normal text color
                    const topClass = hasWinner ? (topWin ? 'gw' : 'gl') : '';
                    const botClass = hasWinner ? (botWin ? 'gw' : 'gl') : '';

                    html += '<div class="game-row">';

                    // Left team (top) — seed in parens, then name, then inline badges
                    html += '<div class="gt-left">';
                    html += '<span class="gt-seed">(' + (g.topSeed || '') + ')</span>';
                    html += '<span class="gt-name ' + topClass + '">' + topName + '</span>';
                    if (hasWinner && !topWin && g.upset) html += ' <span class="upset-badge">UPSET</span>';
                    if (g.live) html += ' <span class="live-badge">LIVE</span>';
                    html += '</div>';

                    // Score
                    html += '<div class="gt-score">';
                    if (g.topScore || g.bottomScore) {
                        html += '<span class="score-val">' + g.topScore + ' - ' + g.bottomScore + '</span>';
                    } else {
                        html += '<span class="score-dash">vs</span>';
                    }
                    if (g.live) html += '<div style="font-size:0.7rem;color:var(--text-muted);text-align:center;margin-top:2px">' + g.live + '</div>';
                    html += '</div>';

                    // Right team (bottom) — name, then seed in parens
                    html += '<div class="gt-right">';
                    html += '<span class="gt-name ' + botClass + '">' + botName + '</span>';
                    html += '<span class="gt-seed">(' + (g.bottomSeed || '') + ')</span>';
                    html += '</div>';

                    html += '</div>';
                }

                html += '</div>';
            }

            document.getElementById('results-container').innerHTML = html;
        }

        function renderLeaderHeader() {
            const sorted = computeScores();
            const leader = sorted[0];
            const headerDiv = document.getElementById('leader-header');
            headerDiv.innerHTML = '';

            const card = document.createElement('div');
            card.className = 'leader-card';

            const titleDiv = document.createElement('div');
            titleDiv.className = 'leader-title';
            titleDiv.textContent = 'Bracket Leader';
            card.appendChild(titleDiv);

            const nameDiv = document.createElement('div');
            nameDiv.className = 'leader-name';
            const crown = document.createElement('span');
            crown.className = 'leader-crown';
            crown.textContent = '\uD83D\uDC51';
            nameDiv.appendChild(crown);
            const nameSpan = document.createElement('span');
            nameSpan.textContent = leader.name;
            nameDiv.appendChild(nameSpan);
            card.appendChild(nameDiv);

            const statsDiv = document.createElement('div');
            statsDiv.className = 'leader-stats';
            statsDiv.textContent = leader.pts + ' points \u2022 Max possible: ' + leader.max;
            card.appendChild(statsDiv);

            const rankingList = document.createElement('div');
            rankingList.className = 'ranking-list';

            for (let i = 0; i < sorted.length; i++) {
                const player = sorted[i];
                const item = document.createElement('div');
                item.className = 'ranking-item';

                const rankSpan = document.createElement('div');
                rankSpan.className = 'ranking-rank';
                rankSpan.textContent = '#' + player.rank;
                item.appendChild(rankSpan);

                const ns = document.createElement('div');
                ns.className = 'ranking-name';
                ns.textContent = player.name;
                item.appendChild(ns);

                const ptsSpan = document.createElement('div');
                ptsSpan.className = 'ranking-pts';
                ptsSpan.textContent = player.pts + ' pts';
                item.appendChild(ptsSpan);

                rankingList.appendChild(item);
            }

            card.appendChild(rankingList);
            headerDiv.appendChild(card);
        }

        function updateTournamentProgress() {
            const roundStatus = getCompletedRounds();
            const allRounds = [2, 3, 4, 5, 6, 7];
            const progDiv = document.getElementById('tournament-progress');
            progDiv.innerHTML = '';

            for (const round of allRounds) {
                const pill = document.createElement('div');
                pill.className = 'round-pill';
                const status = roundStatus[round] || 'upcoming';
                pill.classList.add(status);
                pill.textContent = ROUND_NAMES[round];
                progDiv.appendChild(pill);
            }
        }

        function updateLiveIndicator() {
            const liveCount = Object.values(liveGames).filter(v => !!v).length;
            const indicator = document.getElementById('live-indicator');
            if (liveCount > 0) {
                indicator.classList.add('visible');
                indicator.innerHTML = '<div class="live-dot"></div><span>LIVE \u2014 ' + liveCount + ' game' + (liveCount > 1 ? 's' : '') + ' in progress</span>';
            } else {
                indicator.classList.remove('visible');
            }
        }

        function updateLastUpdated() {
            const now = new Date();
            const fmt = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            document.getElementById('last-updated').textContent = 'Last updated: ' + fmt;
        }

        function render() {
            renderLeaderHeader();

            const sorted = computeScores();
            const tbody = document.getElementById('standings-body');
            tbody.innerHTML = '';

            for (const player of sorted) {
                const tr = document.createElement('tr');

                const rankTd = document.createElement('td');
                rankTd.textContent = player.rank;
                tr.appendChild(rankTd);

                const nameTd = document.createElement('td');
                nameTd.className = 'player-name';
                nameTd.textContent = player.name;
                tr.appendChild(nameTd);

                const ptsTd = document.createElement('td');
                ptsTd.className = 'pts-col';
                ptsTd.textContent = player.pts;
                tr.appendChild(ptsTd);

                const maxTd = document.createElement('td');
                maxTd.className = 'max-col';
                maxTd.textContent = player.max;
                tr.appendChild(maxTd);

                for (const round of [2, 3, 4, 5, 6, 7]) {
                    const roundTd = document.createElement('td');
                    roundTd.className = 'round-col';
                    const val = player.byRound[round] || 0;
                    if (val > 0) {
                        roundTd.classList.add('correct');
                        roundTd.textContent = val;
                    } else {
                        roundTd.textContent = '\u2014';
                    }
                    tr.appendChild(roundTd);
                }

                tbody.appendChild(tr);
            }

            renderResults();
            updateTournamentProgress();
            updateLiveIndicator();
        }

        function switchTab(tab, btn) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            btn.classList.add('active');
        }

        // ============== INIT ==============
        render();
        updateLastUpdated();
        updateLiveScores();
        setInterval(updateLiveScores, 60000);
    </script>
</body>
</html>
