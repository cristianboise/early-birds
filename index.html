<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Early Birds — March Madness 2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2420 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        .header {
            background: linear-gradient(135deg, #2d2420 0%, #1a1a1a 100%);
            border-bottom: 2px solid #d97706;
            padding: 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-logo {
            display: block;
            width: 130px;
            height: 130px;
            margin: 0 auto 15px;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .header .subtitle {
            font-size: 1.1rem;
            color: #d97706;
            font-weight: 600;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
        }

        #last-updated {
            font-size: 0.9rem;
            color: #999;
            margin-bottom: 10px;
        }

        #tournament-progress {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .progress-pill {
            background: #2d2420;
            border: 1px solid #444;
            color: #bbb;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .progress-pill.completed {
            background: #d97706;
            color: #fff;
            border-color: #d97706;
        }

        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 15px;
        }

        .tab-nav {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            border-bottom: 2px solid #333;
        }

        .tab-btn {
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            color: #999;
            font-size: 1.05rem;
            font-weight: 600;
            padding: 12px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-btn:hover {
            color: #d97706;
        }

        .tab-btn.active {
            color: #d97706;
            border-bottom-color: #d97706;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .leader-card {
            background: linear-gradient(135deg, #2d2420 0%, #3d2f26 100%);
            border: 2px solid #d97706;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 8px 32px rgba(217, 119, 6, 0.15);
        }

        .leader-title {
            font-size: 0.9rem;
            color: #d97706;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 15px;
        }

        .leader-name {
            font-size: 2.2rem;
            font-weight: 800;
            color: #fcd34d;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .leader-crown {
            font-size: 2.5rem;
        }

        .leader-stats {
            font-size: 1.1rem;
            color: #d97706;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .ranking-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .ranking-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: rgba(217, 119, 6, 0.05);
            border-radius: 8px;
            border-left: 3px solid #d97706;
        }

        .ranking-rank {
            font-weight: 800;
            color: #d97706;
            min-width: 30px;
            font-size: 1.1rem;
        }

        .ranking-name {
            flex: 1;
            font-weight: 600;
            color: #e0e0e0;
        }

        .ranking-pts {
            color: #d97706;
            font-weight: 700;
            font-size: 1rem;
        }

        .standings-card {
            background: linear-gradient(135deg, #2d2420 0%, #3d2f26 100%);
            border: 1px solid #444;
            border-radius: 12px;
            padding: 20px;
            overflow-x: auto;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }

        thead {
            border-bottom: 2px solid #d97706;
        }

        th {
            padding: 15px 10px;
            text-align: left;
            font-weight: 700;
            color: #d97706;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        td {
            padding: 15px 10px;
            border-bottom: 1px solid #333;
        }

        tr:hover {
            background-color: rgba(217, 119, 6, 0.05);
        }

        .player-name {
            font-weight: 600;
            color: #e0e0e0;
            min-width: 120px;
        }

        .pts-col, .max-col {
            font-weight: 700;
            color: #fcd34d;
            text-align: center;
            min-width: 50px;
        }

        .round-col {
            text-align: center;
            color: #bbb;
            font-weight: 500;
            min-width: 40px;
        }

        .round-col.correct {
            color: #10b981;
            font-weight: 700;
        }

        .round-col.incorrect {
            color: #ef4444;
            opacity: 0.6;
        }

        .round-col.pending {
            color: #f59e0b;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .region-card {
            background: linear-gradient(135deg, #2d2420 0%, #3d2f26 100%);
            border: 1px solid #444;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .region-title {
            font-size: 1.15rem;
            font-weight: 800;
            color: #d97706;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .game-result {
            background: rgba(217, 119, 6, 0.05);
            border-left: 3px solid #d97706;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 6px;
        }

        .game-result.live {
            border-left-color: #f59e0b;
            background: rgba(245, 158, 11, 0.1);
        }

        .game-result.live::after {
            content: ' 🔴 LIVE';
            color: #f59e0b;
            font-weight: 700;
            font-size: 0.8rem;
        }

        .game-result.upset {
            border-left-color: #10b981;
        }

        .game-result.upset::before {
            content: '📈 ';
            margin-right: 4px;
        }

        .game-teams {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .team-score {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .team-name {
            color: #e0e0e0;
            flex: 1;
        }

        .winner-team .team-name {
            color: #10b981;
            font-weight: 700;
        }

        .score {
            color: #d97706;
            font-weight: 700;
            min-width: 30px;
            text-align: right;
        }

        .game-date {
            font-size: 0.8rem;
            color: #666;
            text-align: right;
        }

        .info-footer {
            max-width: 1200px;
            margin: 40px auto;
            padding: 20px 15px;
            background: rgba(217, 119, 6, 0.05);
            border: 1px solid #444;
            border-radius: 8px;
            font-size: 0.9rem;
            color: #999;
            line-height: 1.6;
        }

        .scoring-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }

        .score-item {
            background: rgba(217, 119, 6, 0.1);
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            border: 1px solid #d97706;
        }

        .score-round {
            color: #d97706;
            font-weight: 700;
            font-size: 0.9rem;
        }

        .score-pts {
            color: #fcd34d;
            font-weight: 800;
            font-size: 1.2rem;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .header-logo {
                width: 100px;
                height: 100px;
            }

            .leader-name {
                font-size: 1.6rem;
            }

            .leader-card {
                padding: 15px;
            }

            table {
                font-size: 0.8rem;
            }

            th, td {
                padding: 10px 6px;
            }

            .results-grid {
                grid-template-columns: 1fr;
            }

            .tab-btn {
                padding: 10px 15px;
                font-size: 0.95rem;
            }
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 1.5rem;
            }

            .header .subtitle {
                font-size: 0.95rem;
            }

            .leader-name {
                font-size: 1.4rem;
                gap: 8px;
            }

            .leader-crown {
                font-size: 1.8rem;
            }

            .standings-card {
                padding: 10px;
            }

            table {
                font-size: 0.7rem;
            }

            th, td {
                padding: 8px 4px;
            }

            .round-col {
                min-width: 30px;
            }
        }
    </style>
</head>

                const data = await resp.json();
                if (data.events) {
                    for (const evt of data.events) {
                        if (evt.status.type.name === 'STATUS_IN_PROGRESS' || evt.status.type.name === 'STATUS_FINAL') {
                            const comp = evt.competitions[0];
                            const away = comp.away;
                            const home = comp.home;
                            const awayCode = espnToApp(away.team.abbreviation);
                            const homeCode = espnToApp(home.team.abbreviation);
                            if (awayCode && homeCode) {
                                const idx = findMatchupIdx(awayCode, homeCode);
                                if (idx !== null) {
                                    const isLive = evt.status.type.name === 'STATUS_IN_PROGRESS';
                                    liveGames[idx] = isLive;
                                    GAME_DETAILS[idx] = [parseInt(home.score), parseInt(away.score), null];
                                }
                            }
                        }
                    }
                }
            } catch (err) {
                console.log('ESPN fetch error:', err);
            }
        }

        function espnToApp(abbr) {
            if (abbr in ESPN_TO_APP) return ESPN_TO_APP[abbr];
            return abbr.length <= 5 ? abbr.toUpperCase() : null;
        }

        function findMatchupIdx(team1, team2) {
            for (let i = 0; i < MATCHUPS.length; i++) {
                const m = MATCHUPS[i];
                const t1 = m[2];
                const t2 = m[4];
                if ((t1 === team1 && t2 === team2) || (t1 === team2 && t2 === team1)) {
                    return i;
                }
            }
            return null;
        }

        function advanceWinner(idx, winner) {
            MATCHUPS[idx][6] = winner;
        }

        function updateLiveScores() {
            fetchLiveScores().then(() => {
                render();
                updateLastUpdated();
            });
        }

        // ============== SCORING LOGIC ==============
        function computeScores() {
            const playerScores = {};
            for (const player in PICKS) {
                playerScores[player] = { pts: 0, max: 0, byRound: {} };
                for (const round of [2,3,4,5,6,7]) {
                    playerScores[player].byRound[round] = 0;
                }
            }

            for (let i = 0; i < MATCHUPS.length; i++) {
                const m = MATCHUPS[i];
                const round = m[0];
                if (!(round in SCORING)) continue;
                const scoreVal = SCORING[round];
                const winner = m[6];
                if (!winner || winner === '') continue;

                for (const player in PICKS) {
                    const pick = PICKS[player][i];
                    if (!pick || pick === '') continue;
                    playerScores[player].max += scoreVal;
                    if (pick === winner) {
                        playerScores[player].pts += scoreVal;
                        playerScores[player].byRound[round] = (playerScores[player].byRound[round] || 0) + scoreVal;
                    }
                }
            }

            const sorted = Object.entries(playerScores)
                .map(([name, sc]) => ({ name, ...sc }))
                .sort((a, b) => b.pts - a.pts || b.max - a.max);

            sorted.forEach((s, idx) => {
                s.rank = idx + 1;
            });

            return sorted;
        }

        function isTeamAlive(team) {
            for (const m of MATCHUPS) {
                const round = m[0];
                const t1 = m[2];
                const t2 = m[4];
                const winner = m[6];
                if ((t1 === team || t2 === team) && winner === team) {
                    return true;
                }
            }
            return false;
        }

        function getCompletedRounds() {
            const rounds = new Set();
            for (const m of MATCHUPS) {
                if (m[6] && m[6] !== '') {
                    rounds.add(m[0]);
                }
            }
            return Array.from(rounds).sort((a, b) => a - b);
        }

        function getResultsByRegion() {
            const regions = {};
            for (const region of ['E', 'S', 'W', 'M', 'F']) {
                regions[region] = [];
            }

            for (let i = 0; i < MATCHUPS.length; i++) {
                const m = MATCHUPS[i];
                const round = m[0];
                const region = m[1];
                const t1 = m[2];
                const t2 = m[4];
                const winner = m[6];

                if (!winner || winner === '') continue;
                if (region === 'F' && (t1 === null || t2 === null)) continue;

                const detail = GAME_DETAILS[i] || [0, 0];
                const isLive = liveGames[i] || false;
                let score1 = 0, score2 = 0;
                if (Array.isArray(detail) && detail.length >= 2) {
                    score1 = detail[0];
                    score2 = detail[1];
                }

                const loser = (t1 === winner) ? t2 : t1;
                const loserScore = (t1 === winner) ? score2 : score1;
                const winnerScore = (t1 === winner) ? score1 : score2;

                const seed1 = m[3];
                const seed2 = m[5];
                const seedDiff = Math.abs(seed1 - seed2);
                const isUpset = (winner === t2 && seed2 > seed1) || (winner === t1 && seed1 > seed2);

                regions[region].push({
                    round,
                    winner,
                    loser,
                    winnerScore,
                    loserScore,
                    isUpset,
                    isLive,
                    seedDiff
                });
            }

            for (const region in regions) {
                regions[region].sort((a, b) => a.round - b.round);
            }

            return regions;
        }

        // ============== RENDERING ==============
        function renderResults() {
            const resultsByRegion = getResultsByRegion();
            const grid = document.getElementById('results-grid');
            grid.innerHTML = '';

            for (const region of ['E', 'S', 'W', 'M', 'F']) {
                if (resultsByRegion[region].length === 0) continue;

                const card = document.createElement('div');
                card.className = 'region-card';

                const title = document.createElement('div');
                title.className = 'region-title';
                title.textContent = REGION_FULL[region];
                card.appendChild(title);

                for (const result of resultsByRegion[region]) {
                    const gameDiv = document.createElement('div');
                    gameDiv.className = 'game-result';
                    if (result.isLive) gameDiv.classList.add('live');
                    if (result.isUpset) gameDiv.classList.add('upset');

                    const teamsDiv = document.createElement('div');
                    teamsDiv.className = 'game-teams';

                    const winnerDiv = document.createElement('div');
                    winnerDiv.className = 'team-score winner-team';
                    const winnerSpan = document.createElement('span');
                    winnerSpan.className = 'team-name';
                    winnerSpan.textContent = TEAM_NAMES[result.winner] || result.winner;
                    const winnerScoreSpan = document.createElement('span');
                    winnerScoreSpan.className = 'score';
                    winnerScoreSpan.textContent = result.winnerScore;
                    winnerDiv.appendChild(winnerSpan);
                    winnerDiv.appendChild(winnerScoreSpan);

                    const loserDiv = document.createElement('div');
                    loserDiv.className = 'team-score';
                    const loserSpan = document.createElement('span');
                    loserSpan.className = 'team-name';
                    loserSpan.textContent = TEAM_NAMES[result.loser] || result.loser;
                    const loserScoreSpan = document.createElement('span');
                    loserScoreSpan.className = 'score';
                    loserScoreSpan.textContent = result.loserScore;
                    loserDiv.appendChild(loserSpan);
                    loserDiv.appendChild(loserScoreSpan);

                    teamsDiv.appendChild(winnerDiv);
                    teamsDiv.appendChild(loserDiv);
                    gameDiv.appendChild(teamsDiv);

                    const dateDiv = document.createElement('div');
                    dateDiv.className = 'game-date';
                    const detail = GAME_DETAILS[i] || [];
                    if (detail.length >= 3 && detail[2]) {
                        dateDiv.textContent = detail[2];
                    } else {
                        dateDiv.textContent = ROUND_NAMES[result.round] || '';
                    }
                    gameDiv.appendChild(dateDiv);

                    card.appendChild(gameDiv);
                }

                grid.appendChild(card);
            }
        }

        function renderLeaderHeader() {
            const sorted = computeScores();
            const leader = sorted[0];
            const headerDiv = document.getElementById('leader-header');
            headerDiv.innerHTML = '';

            const card = document.createElement('div');
            card.className = 'leader-card';

            const titleDiv = document.createElement('div');
            titleDiv.className = 'leader-title';
            titleDiv.textContent = 'Bracket Leader';
            card.appendChild(titleDiv);

            const nameDiv = document.createElement('div');
            nameDiv.className = 'leader-name';
            const crown = document.createElement('span');
            crown.className = 'leader-crown';
            crown.textContent = '👑';
            nameDiv.appendChild(crown);
            const nameSpan = document.createElement('span');
            nameSpan.textContent = leader.name;
            nameDiv.appendChild(nameSpan);
            card.appendChild(nameDiv);

            const statsDiv = document.createElement('div');
            statsDiv.className = 'leader-stats';
            statsDiv.textContent = `${leader.pts} / ${leader.max} points`;
            card.appendChild(statsDiv);

            const rankingList = document.createElement('div');
            rankingList.className = 'ranking-list';

            for (let i = 0; i < sorted.length; i++) {
                const player = sorted[i];
                const item = document.createElement('div');
                item.className = 'ranking-item';

                const rankSpan = document.createElement('div');
                rankSpan.className = 'ranking-rank';
                rankSpan.textContent = `#${player.rank}`;
                item.appendChild(rankSpan);

                const nameSpan = document.createElement('div');
                nameSpan.className = 'ranking-name';
                nameSpan.textContent = player.name;
                item.appendChild(nameSpan);

                const ptsSpan = document.createElement('div');
                ptsSpan.className = 'ranking-pts';
                ptsSpan.textContent = `${player.pts} pts`;
                item.appendChild(ptsSpan);

                rankingList.appendChild(item);
            }

            card.appendChild(rankingList);
            headerDiv.appendChild(card);
        }

        function updateTournamentProgress() {
            const completed = getCompletedRounds();
            const allRounds = [2, 3, 4, 5, 6, 7];
            const progDiv = document.getElementById('tournament-progress');
            progDiv.innerHTML = '';

            for (const round of allRounds) {
                const pill = document.createElement('div');
                pill.className = 'progress-pill';
                if (completed.includes(round)) {
                    pill.classList.add('completed');
                }
                pill.textContent = ROUND_NAMES[round];
                progDiv.appendChild(pill);
            }
        }

        function updateLastUpdated() {
            const now = new Date();
            const fmt = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            document.getElementById('last-updated').textContent = `Last updated: ${fmt}`;
        }

        function render() {
            renderLeaderHeader();

            const sorted = computeScores();
            const tbody = document.getElementById('standings-body');
            tbody.innerHTML = '';

            for (const player of sorted) {
                const tr = document.createElement('tr');

                const rankTd = document.createElement('td');
                rankTd.textContent = player.rank;
                tr.appendChild(rankTd);

                const nameTd = document.createElement('td');
                nameTd.className = 'player-name';
                nameTd.textContent = player.name;
                tr.appendChild(nameTd);

                const ptsTd = document.createElement('td');
                ptsTd.className = 'pts-col';
                ptsTd.textContent = player.pts;
                tr.appendChild(ptsTd);

                const maxTd = document.createElement('td');
                maxTd.className = 'max-col';
                maxTd.textContent = player.max;
                tr.appendChild(maxTd);

                for (const round of [2, 3, 4, 5, 6, 7]) {
                    const roundTd = document.createElement('td');
                    roundTd.className = 'round-col';
                    const val = player.byRound[round] || 0;
                    if (val > 0) {
                        roundTd.classList.add('correct');
                        roundTd.textContent = val;
                    } else {
                        roundTd.textContent = '—';
                    }
                    tr.appendChild(roundTd);
                }

                tbody.appendChild(tr);
            }

            renderResults();
            updateTournamentProgress();
        }

        function switchTab(tab, btn) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));

            document.getElementById(`tab-${tab}`).classList.add('active');
            btn.classList.add('active');
        }

        // ============== INIT ==============
        render();
        updateLastUpdated();
        updateLiveScores();
        setInterval(updateLiveScores, 60000);
    </script>
</body>
</html>
